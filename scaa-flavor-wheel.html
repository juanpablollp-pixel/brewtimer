<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Exo 2", sans-serif; background: #fff; color: #111; max-width: 430px; margin: 0 auto; padding-bottom: 48px; }
  .header { padding: 36px 24px 16px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; gap: 14px; }
  .btn-back { background: none; border: none; font-size: 20px; cursor: pointer; color: #111; padding: 0; line-height: 1; }
  .header-titulo { font-family: "new-astro", sans-serif; font-size: 22px; color: #111; }
  .wheel-list { padding: 16px 24px 0; }
  .cat-item { margin-bottom: 8px; }
  .cat-btn { width: 100%; border: none; border-radius: 4px; padding: 14px 16px; font-family: "Exo 2", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .cat-btn.dark-text { color: #111; }
  .cat-arrow { font-size: 10px; transition: transform 0.2s; opacity: 0.8; }
  .cat-item.open .cat-arrow { transform: rotate(180deg); }
  .cat-content { display: none; padding: 8px 0 0 16px; }
  .cat-item.open .cat-content { display: block; }
  
  .sub-item { margin-bottom: 6px; position: relative; }
  .sub-row { position: relative; padding-left: 14px; }
  .sub-row::before { content: ""; position: absolute; left: -14px; top: 50%; width: 12px; height: 2px; background: #e8e8e8; transform: translateY(-50%); }
  .sub-btn { width: 100%; border: none; border-radius: 4px; padding: 10px 14px; font-family: "Exo 2", sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .sub-btn.dark-text { color: #111; }
  .sub-content { display: none; padding: 6px 0 0 12px; }
  .sub-item.open .sub-content { display: block; }
  
  .leaf-item { position: relative; margin-bottom: 5px; }
  .leaf-row { position: relative; padding-left: 12px; }
  .leaf-row::before { content: ""; position: absolute; left: -14px; top: 50%; width: 12px; height: 2px; background: #e8e8e8; transform: translateY(-50%); }
  .leaf-btn { width: 100%; border: none; border-radius: 4px; padding: 9px 14px; font-family: "Exo 2", sans-serif; font-size: 11px; font-weight: 400; color: #fff; text-align: left; cursor: default; }
  .leaf-btn.dark-text { color: #111; }

  
  .cat-content-inner,
  .sub-content-inner { border-left: none; position: relative; }

  /* vertical segment for each item except last */
  .sub-item,
  .leaf-item {
    position: relative;
  }

  

  /* stop vertical line at midpoint of last item */
  

  /* horizontal connector */
  .sub-row::before,
  .leaf-row::before { content: ""; position: absolute; left: -14px; top: 50%; width: 12px; height: 2px; background: #e8e8e8; transform: translateY(-50%); }


  
  .cat-content-inner,
  .sub-content-inner { border-left: none; position: relative; }

  .sub-item,
  .leaf-item {
    position: relative;
  }

  /* horizontal connector line per item */
  .sub-row::before,
  .leaf-row::before { content: ""; position: absolute; left: -14px; top: 50%; width: 12px; height: 2px; background: #e8e8e8; transform: translateY(-50%); }

  /* white block that covers the vertical line below the last item's midpoint */
  

</style>
</head>

<script>
function toggleCat(id) {
  document.querySelectorAll(".cat-item").forEach(item => {
    if (item.id === "cat-" + id) item.classList.toggle("open");
    else { item.classList.remove("open"); item.querySelectorAll(".sub-item").forEach(s => s.classList.remove("open")); }
  });
}
function toggleSub(id) {
  const target = document.getElementById("sub-" + id);
  if (!target) return;
  const parent = target.closest(".cat-content-inner");
  parent.querySelectorAll(".sub-item").forEach(s => {
    if (s === target) s.classList.toggle("open"); else s.classList.remove("open");
  });
}
</script>




<script>
function fixConnectors() {
  document.querySelectorAll('.cat-content-inner, .sub-content-inner').forEach(container => {
    const items = Array.from(container.children).filter(el =>
      el.classList.contains('sub-item') || el.classList.contains('leaf-item')
    );
    if (items.length === 0) return;

    const last = items[items.length - 1];
    const lastRow = last.querySelector('.sub-row, .leaf-row');
    if (!lastRow) return;

    const containerRect = container.getBoundingClientRect();
    const lastRowRect = lastRow.getBoundingClientRect();
    const height = (lastRowRect.top + lastRowRect.height / 2) - containerRect.top;

    // Remove old vline
    const old = container.querySelector(':scope > .vline');
    if (old) old.remove();

    const line = document.createElement('div');
    line.className = 'vline';
    line.style.cssText = [
      'position: absolute',
      'left: -14px',
      'top: 0',
      'width: 2px',
      'background: #e8e8e8',
      'pointer-events: none',
      'height: ' + Math.round(height) + 'px'
    ].join(';');

    container.style.position = 'relative';
    container.prepend(line);
  });
}
window.addEventListener('load', fixConnectors);
document.addEventListener('click', () => setTimeout(fixConnectors, 50));
</script>
