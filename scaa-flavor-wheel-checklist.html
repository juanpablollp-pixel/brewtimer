<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@200;300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.typekit.net/afq6ikf.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Exo 2", sans-serif; background: #fff; color: #111; max-width: 430px; margin: 0 auto; padding-bottom: 48px; }

  .sticky-header { position: sticky; top: 0; z-index: 50; background: #fff; border-bottom: 1px solid #e8e8e8; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .btn-back { background: none; border: none; font-size: 20px; cursor: pointer; color: #111; padding: 0; }
  .header-titulo { font-family: "new-astro", sans-serif; font-size: 19px; color: #111; }
  .btn-listo { font-family: "Exo 2", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; background: #4a7c59; color: #fff; border: none; border-radius: 4px; padding: 10px 18px; cursor: pointer; }

  .chips-section { padding: 14px 24px; border-bottom: 1px solid #e8e8e8; min-height: 52px; }
  .chips-label { font-size: 9px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: #bbb; margin-bottom: 8px; }
  .chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px 4px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; color: #fff; }
  .chip.dark-text { color: #111; }
  .chip-x { font-size: 10px; opacity: 0.8; cursor: pointer; }
  .chips-empty { font-size: 11px; font-weight: 300; color: #bbb; font-style: italic; }

  .wheel-list { padding: 16px 24px 0; }

  /* LEVEL 1 */
  .cat-item { margin-bottom: 8px; }
  .cat-row { display: flex; align-items: center; gap: 8px; }
  .cat-btn { flex: 1; border: none; border-radius: 4px; padding: 14px 16px; font-family: "Exo 2", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .cat-btn.dark-text { color: #111; }
  .cat-arrow { font-size: 10px; transition: transform 0.2s; opacity: 0.8; }
  .cat-item.open > .cat-row .cat-arrow { transform: rotate(180deg); }

  /* EXPAND AREA — flex row: [connector-col 14px] [content] */
  .cat-content { display: none; padding-top: 6px; padding-left: 32px; position: relative; }
  .cat-item.open > .cat-content { display: flex; }

  .sub-content { display: none; padding-top: 6px; padding-left: 28px; position: relative; }
  .sub-item.open > .sub-content { display: flex; }

  /* vertical connector column */
  .connector-col { position: absolute; left: 32px; top: 0; width: 2px; background: #e8e8e8; }
  .sub-content > .connector-col { left: 28px; }

  /* inner content */
  .cat-content-inner,
  .sub-content-inner { flex: 1; display: flex; flex-direction: column; gap: 6px; }

  /* LEVEL 2 row */
  .sub-row { display: flex; align-items: center; gap: 8px; position: relative; }
  .leaf-row { display: flex; align-items: center; gap: 8px; position: relative; }

  /* horizontal line — sits in its own 14px slot before the check */
  .h-line { width: 14px; height: 2px; background: #e8e8e8; flex-shrink: 0; }

  .sub-btn { flex: 1; border: none; border-radius: 4px; padding: 10px 14px; font-family: "Exo 2", sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .sub-btn.dark-text { color: #111; }
  .leaf-btn { flex: 1; border: none; border-radius: 4px; padding: 9px 14px; font-family: "Exo 2", sans-serif; font-size: 11px; font-weight: 400; color: #fff; text-align: left; cursor: pointer; }
  .leaf-btn.dark-text { color: #111; }

  /* CHECK CIRCLE */
  .custom-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #e8e8e8; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 12px; color: transparent; transition: all 0.15s; }
  .custom-check.checked { color: #fff; border-color: transparent; }
  .custom-check.checked.dark-check { color: #111; }
</style>
</head>

        <div class="sub-item" id="sub-crudo">
          <div class="sub-row">
            <div class="h-line"></div>

        <div class="sub-item" id="sub-leguminoso">

            <button class="sub-btn" style="background:#45a451" onclick="toggleSub('verdevegetal')">Verde / Vegetal <span class="cat-arrow">▼</span></button>

<script>
  const sel = new Map();

  document.querySelectorAll(".custom-check").forEach(el => {
    el.addEventListener("click", () => {
      const { id, label, color, dark } = el.dataset;
      const isDark = dark === "true";
      if (sel.has(id)) {
        sel.delete(id);
        el.classList.remove("checked");
        el.style.cssText = "";
      } else {
        sel.set(id, { label, color, dark: isDark });
        el.classList.add("checked");
        el.style.background = color;
        el.style.borderColor = color;
        el.style.color = isDark ? "#111" : "#fff";
      }
      renderChips();
    });
  });

  function renderChips() {
    const wrap = document.getElementById("chips-wrap");
    const empty = document.getElementById("chips-empty");
    if (sel.size === 0) { wrap.innerHTML = ""; wrap.appendChild(empty); empty.style.display = "block"; return; }
    empty.style.display = "none";
    wrap.innerHTML = "";
    sel.forEach(({ label, color, dark }, id) => {
      const chip = document.createElement("span");
      chip.className = "chip" + (dark ? " dark-text" : "");
      chip.style.background = color;
      chip.appendChild(document.createTextNode(label + " "));
      const x = document.createElement("span");
      x.className = "chip-x";
      x.textContent = "✕";
      x.addEventListener("click", () => document.getElementById("chk-" + id).click());
      chip.appendChild(x);
      wrap.appendChild(chip);
    });
  }

  function fixConnectors() {
    document.querySelectorAll(".cat-content, .sub-content").forEach(container => {
      const col = container.querySelector(":scope > .connector-col");
      if (!col) return;
      const inner = container.querySelector(":scope > .cat-content-inner, :scope > .sub-content-inner");
      if (!inner) return;
      const rows = Array.from(inner.querySelectorAll(":scope > .sub-item > .sub-row, :scope > .leaf-item > .leaf-row"));
      if (!rows.length) return;
      const lastRow = rows[rows.length - 1];
      const containerTop = container.getBoundingClientRect().top;
      const lastMid = lastRow.getBoundingClientRect().top + lastRow.getBoundingClientRect().height / 2;
      col.style.height = Math.round(lastMid - containerTop) + "px";
      col.style.top = "0px";
    });
  }

  function toggleCat(id) {
    document.querySelectorAll(".cat-item").forEach(item => {
      if (item.id === "cat-" + id) item.classList.toggle("open");
      else { item.classList.remove("open"); item.querySelectorAll(".sub-item").forEach(s => s.classList.remove("open")); }
    });
    setTimeout(fixConnectors, 20);
  }

  function toggleSub(id) {
    const target = document.getElementById("sub-" + id);
    if (!target) return;
    const parent = target.closest(".cat-content-inner");
    parent.querySelectorAll(".sub-item").forEach(s => {
      if (s === target) s.classList.toggle("open"); else s.classList.remove("open");
    });
    setTimeout(fixConnectors, 20);
  }

  document.getElementById("btn-listo").addEventListener("click", () => {
    const names = Array.from(sel.values()).map(s => s.label);
    alert("Guardando: " + (names.length ? names.join(", ") : "ninguno") + "\n\n(En React esto cierra la vista y vuelve al Detalle)");
  });

  window.addEventListener("load", fixConnectors);
</script>
